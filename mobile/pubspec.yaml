name: ikindle_mobile
description: "iKindle 电子书阅读平台 - Flutter 多端应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1
  json_annotation: ^4.9.0

  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # UI utilities
  flutter_hooks: ^0.21.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  flutter_screenutil: ^5.9.3

  # OAuth / WebView
  webview_flutter: ^4.11.0
  url_launcher: ^6.3.1

  # Localization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

